<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#2E7D5E" />

    <!-- Preconnect to Google Fonts servers so the connection is ready -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts directly from HTML — avoids the render-blocking CSS @import -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,300;1,6..72,400&family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" />

    <!-- Preload the hero image — it's the LCP element on the homepage -->
    <link rel="preload" as="image" href="/hero-bg.webp" />

    <!-- Title + all SEO meta (description, canonical, Open Graph, Twitter) is
         managed per-page by react-helmet-async (src/components/SEO.jsx) and
         baked into each route's static HTML by the prerender step
         (scripts/prerender.mjs). Kept out of the static shell so prerendered
         pages have exactly one of each tag, with no stale fallbacks. -->

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MZ2RNCEL8Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MZ2RNCEL8Y', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
